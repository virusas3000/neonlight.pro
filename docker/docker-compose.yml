version: "3.9"

services:
  mariadb:
    image: mariadb:11.4
    container_name: nlwp_mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: neonlighthk
      MYSQL_USER: wpuser
      MYSQL_PASSWORD: wppass
    volumes:
      - db_data:/var/lib/mysql
      - ../sql:/docker-entrypoint-initdb.d
    ports:
      - "3307:3306"
    networks:
      - nlwp_net

  redis:
    image: redis:7-alpine
    container_name: nlwp_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    networks:
      - nlwp_net

  wordpress:
    image: wordpress:6.7-php8.2-fpm
    container_name: nlwp_wordpress
    restart: unless-stopped
    environment:
      WORDPRESS_DB_HOST: mariadb:3306
      WORDPRESS_DB_NAME: neonlighthk
      WORDPRESS_DB_USER: wpuser
      WORDPRESS_DB_PASSWORD: wppass
      WORDPRESS_CONFIG_EXTRA: |
        /* Redis */
        define('WP_REDIS_HOST', 'redis');
        define('WP_REDIS_PORT', 6379);
        define('WP_REDIS_PREFIX', 'nlwp_');
        /* Multisite / Multilingual */
        define('WPML_URL_CONVERT_MODE', 'directory');
        /* Security */
        define('DISALLOW_FILE_EDIT', true);
        define('FORCE_SSL_ADMIN', false);
        /* Performance */
        define('WP_MEMORY_LIMIT', '512M');
    volumes:
      - wp_data:/var/www/html
      - ../wp-content/themes/neonlighthk:/var/www/html/wp-content/themes/neonlighthk
      - ../wp-content/plugins/hktms-gateway:/var/www/html/wp-content/plugins/hktms-gateway
      - ../wp-content/plugins/hktpl-gateway:/var/www/html/wp-content/plugins/hktpl-gateway
      - ../wp-content/plugins/appointment-hour-booking:/var/www/html/wp-content/plugins/appointment-hour-booking
      - ./wp-config-docker.php:/var/www/html/wp-config.php:ro
      - ./php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    depends_on:
      - mariadb
      - redis
    networks:
      - nlwp_net

  nginx:
    image: nginx:alpine
    container_name: nlwp_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - wp_data:/var/www/html:ro
      - ../wp-content/themes/neonlighthk:/var/www/html/wp-content/themes/neonlighthk:ro
      - ../wp-content/plugins/hktms-gateway:/var/www/html/wp-content/plugins/hktms-gateway:ro
      - ../wp-content/plugins/hktpl-gateway:/var/www/html/wp-content/plugins/hktpl-gateway:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - wordpress
    networks:
      - nlwp_net

  wpcli:
    image: wordpress:cli-php8.2
    container_name: nlwp_wpcli
    environment:
      WORDPRESS_DB_HOST: mariadb:3306
      WORDPRESS_DB_NAME: neonlighthk
      WORDPRESS_DB_USER: wpuser
      WORDPRESS_DB_PASSWORD: wppass
    volumes:
      - wp_data:/var/www/html
      - ../wp-content/themes/neonlighthk:/var/www/html/wp-content/themes/neonlighthk
      - ../wp-content/plugins/hktms-gateway:/var/www/html/wp-content/plugins/hktms-gateway
      - ../wp-content/plugins/hktpl-gateway:/var/www/html/wp-content/plugins/hktpl-gateway
      - ../wp-content/plugins/appointment-hour-booking:/var/www/html/wp-content/plugins/appointment-hour-booking
      - ./wp-config-docker.php:/var/www/html/wp-config.php:ro
    depends_on:
      - mariadb
      - wordpress
    networks:
      - nlwp_net
    entrypoint: ["wp", "--allow-root"]
    command: ["--info"]

volumes:
  db_data:
  wp_data:

networks:
  nlwp_net:
    driver: bridge
