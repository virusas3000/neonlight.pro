;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; PHP.ini for WordPress / WooCommerce (Docker)
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

; ── File Uploads ──
upload_max_filesize = 64M
post_max_size       = 64M

; ── Memory & Execution ──
memory_limit        = 512M
max_execution_time  = 300
max_input_time      = 300
max_input_vars      = 3000

; ── Error Handling ──
display_errors = Off
log_errors     = On

; ── Date / Time ──
date.timezone = "Asia/Hong_Kong"

; ── OPcache ──
opcache.enable                  = 1
opcache.memory_consumption      = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files   = 10000
opcache.revalidate_freq         = 2
opcache.validate_timestamps     = 1

; ── Sessions (Redis) ──
session.save_handler = redis
session.save_path    = "tcp://redis:6379"

; ── Additional WordPress-friendly defaults ──
file_uploads         = On
upload_max_filesize  = 64M
max_file_uploads     = 20
short_open_tag       = Off
expose_php           = Off
allow_url_fopen      = On
allow_url_include    = Off
